<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moviora Cinemas — Iniciar sesión</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="login.css">
</head>
<body>

<div class="pantalla">

  <!-- LADO IZQUIERDO: decoración -->
  <div class="lado-imagen">
    <div class="contenido-imagen">
      <div class="marquesina">
        <div class="bombillas">
          <div class="bombilla"></div>
          <div class="bombilla"></div>
          <div class="bombilla"></div>
          <div class="bombilla"></div>
          <div class="bombilla"></div>
          <div class="bombilla"></div>
        </div>

        <div class="nombre-cine">Moviora</div>
        <div class="tagline">Cinemas</div>

        <div class="bombillas-abajo">
          <div class="bombilla"></div>
          <div class="bombilla"></div>
          <div class="bombilla"></div>
          <div class="bombilla"></div>
          <div class="bombilla"></div>
          <div class="bombilla"></div>
        </div>
      </div>

      <div class="separador-estrella">★ ★ ★</div>
      <p class="frase">
        "Donde cada función es una experiencia<br>que nunca olvidarás."
      </p>
    </div>
  </div>

  <!-- LADO DERECHO: formulario -->
  <div class="lado-form">
    <h1 class="form-titulo">Bienvenido</h1>
    <p class="form-subtitulo">Ingresa a tu cuenta para continuar</p>

    <div class="tabs">
      <div class="tab activo" onclick="cambiarTab(this, 'cliente')">Cliente</div>
      <div class="tab" onclick="cambiarTab(this, 'empleado')">Empleado</div>
    </div>

    <form id="form-login" action="#" method="POST">
      <input type="hidden" name="rol" id="campo-rol" value="cliente">

      <div class="campo">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" name="email" placeholder="tucorreo@ejemplo.com" required>
      </div>

      <div class="campo">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required>
      </div>

      <button type="submit" class="btn-entrar">Entrar</button>
    </form>

    <div class="rol-badge">
      Ingresando como: <span id="texto-rol">Cliente</span>
    </div>

    <div class="ornamento">✦ ✦ ✦</div>
  </div>

</div>

<script>
  function cambiarTab(tab, rol) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('activo'));
    tab.classList.add('activo');
    document.getElementById('campo-rol').value = rol;
    document.getElementById('texto-rol').textContent =
      rol === 'empleado' ? 'Empleado' : 'Cliente';
  }
</script>

</body>
</html>
