<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moviora Cinemas — Registro</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="registro.css">
</head>
<body>
<div class="pantalla">

  <!-- LADO IZQUIERDO -->
  <div class="lado-imagen">
    <div class="contenido-imagen">
      <div class="marquesina">
        <div class="bombillas">
          <div class="bombilla"></div><div class="bombilla"></div>
          <div class="bombilla"></div><div class="bombilla"></div>
          <div class="bombilla"></div><div class="bombilla"></div>
        </div>
        <div class="nombre-cine">Moviora</div>
        <div class="tagline">Cinemas</div>
        <div class="bombillas-abajo">
          <div class="bombilla"></div><div class="bombilla"></div>
          <div class="bombilla"></div><div class="bombilla"></div>
          <div class="bombilla"></div><div class="bombilla"></div>
        </div>
      </div>
      <div class="separador-estrella">★ ★ ★</div>
      <p class="frase">"Donde cada función es una experiencia<br>que nunca olvidarás."</p>
    </div>
  </div>

  <!-- LADO DERECHO -->
  <div class="lado-form">
    <h1 class="form-titulo">Crear cuenta</h1>
    <p class="form-subtitulo">Elige tu tipo de cuenta para continuar</p>

    <!-- Selector de rol -->
    <div class="rol-seleccionado">
      <div class="rol-btn activo-cliente" id="btn-cliente" onclick="seleccionarRol('cliente')">
        🎬 Cliente
      </div>
      <div class="rol-btn" id="btn-empleado" onclick="seleccionarRol('empleado')">
        🏢 Empleado
      </div>
    </div>

    <form action="#" method="POST">
      <!-- Campo oculto: el rol lo maneja el JS, el usuario no lo ve -->
      <input type="hidden" name="rol" id="campo-rol" value="cliente">

      <div class="fila">
        <div class="campo">
          <label for="nombre">Nombre</label>
          <input type="text" id="nombre" name="nombre" placeholder="Juan" required>
        </div>
        <div class="campo">
          <label for="apellido">Apellido</label>
          <input type="text" id="apellido" name="apellido" placeholder="Pérez" required>
        </div>
      </div>

      <div class="campo">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" name="email" placeholder="tucorreo@ejemplo.com" required>
      </div>

      <div class="campo">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" placeholder="Mínimo 8 caracteres" required>
      </div>

      <!-- Solo aparece si selecciona Empleado -->
      <div class="seccion-codigo" id="seccion-codigo">
        <div class="campo campo-codigo">
          <label for="codigo">Código de empleado</label>
          <input type="password" id="codigo" name="codigo" placeholder="••••••••">
          <p class="hint-codigo">Solicita este código a tu administrador.</p>
        </div>
      </div>

      <button type="submit" class="btn-registrar">Crear cuenta</button>
    </form>

    <p class="link-login">¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a></p>
    <div class="ornamento">✦ ✦ ✦</div>
  </div>

</div>

<script>
  function seleccionarRol(rol) {
    const btnCliente  = document.getElementById('btn-cliente');
    const btnEmpleado = document.getElementById('btn-empleado');
    const seccion     = document.getElementById('seccion-codigo');
    const campoRol    = document.getElementById('campo-rol');
    const campoCodigo = document.getElementById('codigo');

    campoRol.value = rol;

    if (rol === 'empleado') {
      btnCliente.classList.remove('activo-cliente');
      btnEmpleado.classList.add('activo-empleado');
      seccion.classList.add('visible');
      campoCodigo.required = true;
    } else {
      btnEmpleado.classList.remove('activo-empleado');
      btnCliente.classList.add('activo-cliente');
      seccion.classList.remove('visible');
      campoCodigo.required = false;
      campoCodigo.value = '';
    }
  }
</script>

</body>
</html>
